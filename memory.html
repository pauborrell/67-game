<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ous de Pasqua 67 – Memory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at top, #1a0d2e 0%, #0d1f0d 100%);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 10px 24px;
  color: white;
  overflow-x: hidden;
}

/* ── GRASS DECORATION ───────────────────────── */
body::before {
  content: '';
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: repeating-linear-gradient(
    90deg,
    #2d5a1b 0px, #2d5a1b 8px,
    transparent 8px, transparent 12px
  );
  clip-path: polygon(
    0% 100%, 2% 40%, 4% 80%, 6% 20%, 8% 70%, 10% 35%,
    12% 85%, 14% 50%, 16% 10%, 18% 60%, 20% 30%, 22% 80%,
    24% 45%, 26% 15%, 28% 65%, 30% 40%, 32% 90%, 34% 55%,
    36% 25%, 38% 75%, 40% 42%, 42% 12%, 44% 68%, 46% 38%,
    48% 85%, 50% 50%, 52% 22%, 54% 72%, 56% 45%, 58% 18%,
    60% 62%, 62% 35%, 64% 80%, 66% 48%, 68% 20%, 70% 65%,
    72% 38%, 74% 88%, 76% 52%, 78% 28%, 80% 70%, 82% 42%,
    84% 15%, 86% 60%, 88% 30%, 90% 75%, 92% 48%, 94% 20%,
    96% 65%, 98% 38%, 100% 80%, 100% 100%
  );
  z-index: 0;
  pointer-events: none;
}

/* ── TITLE ──────────────────────────────────── */
.title {
  font-size: 2.8rem;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  background: linear-gradient(135deg, #FFB3C1, #C3A3D1, #AED9E0, #B5EAD7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 2px;
}
.subtitle {
  font-size: 0.85rem;
  color: #666;
  margin-bottom: 14px;
  letter-spacing: 1px;
}
.back-link {
  font-size: 0.78rem;
  color: #555;
  text-decoration: none;
  margin-bottom: 14px;
  display: inline-block;
  transition: color 0.2s;
}
.back-link:hover { color: #aaa; }

/* ── HUD ────────────────────────────────────── */
.hud {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}
.hud-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 7px 18px;
  text-align: center;
  min-width: 80px;
}
.hud-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  color: #555;
  letter-spacing: 1px;
  margin-bottom: 1px;
}
.hud-value {
  font-size: 1.7rem;
  font-weight: 900;
  line-height: 1;
}
#score-val  { color: #FFE566; }
#pairs-val  { color: #B5EAD7; }
#moves-val  { color: #FFC9A3; }
#timer-val  { color: #A8E6CF; font-variant-numeric: tabular-nums; }
#timer-box.warning #timer-val { color: #FFB347; animation: blink 0.6s infinite alternate; }
#timer-box.urgent  #timer-val { color: #FF6B6B; animation: blink 0.3s infinite alternate; }

@keyframes blink {
  from { opacity: 1; }
  to   { opacity: 0.5; }
}

/* ── DIFFICULTY BUTTONS ─────────────────────── */
.diff-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.diff-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: #888;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
}
.diff-btn:hover  { background: rgba(255,255,255,0.12); color: #ccc; }
.diff-btn.active { background: rgba(255,210,0,0.15); border-color: #ffd200; color: #ffd200; }

/* ── GRID ───────────────────────────────────── */
#grid {
  display: grid;
  gap: 8px;
}

/* ── CARD ───────────────────────────────────── */
.card {
  perspective: 700px;
  cursor: pointer;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4, 0.2, 0.2, 1);
}
.card.flipped   .card-inner { transform: rotateY(180deg); }
.card.matched   .card-inner { transform: rotateY(180deg); }

.card-back, .card-front {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Card back: shows the egg */
.card-back {
  background: #1e1e3a;
  border: 2px solid rgba(255,255,255,0.08);
  overflow: hidden;
}
.card-back:hover { border-color: rgba(255,255,255,0.2); }

/* Card front: shows the number */
.card-front {
  background: white;
  transform: rotateY(180deg);
  flex-direction: column;
  gap: 2px;
  border: 3px solid transparent;
}
.card.matched .card-front {
  border-color: #4ade80;
  box-shadow: 0 0 16px rgba(74,222,128,0.5);
  animation: matchPop 0.4s cubic-bezier(0.34,1.7,0.64,1);
}
.card-number {
  font-size: 2rem;
  font-weight: 900;
  color: #1a1a2e;
  line-height: 1;
}
.card-hint {
  font-size: 0.6rem;
  color: #aaa;
  letter-spacing: 1px;
}

@keyframes matchPop {
  0%   { transform: rotateY(180deg) scale(0.9); }
  60%  { transform: rotateY(180deg) scale(1.08); }
  100% { transform: rotateY(180deg) scale(1); }
}

/* ── EGG (revers únic de la carta) ──────────── */
.egg {
  width: 60%;
  aspect-ratio: 4/5;
  border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
  position: relative;
  overflow: hidden;
  box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2), inset 2px 2px 6px rgba(255,255,255,0.3);
  transition: transform 0.2s;
}
.card:not(.flipped):not(.matched) .card-back:hover .egg {
  transform: scale(1.05) rotate(5deg);
}

/* Egg 0 – Rosa amb punts grocs */
.egg-0 {
  background:
    radial-gradient(circle, #FFE566 3.5px, transparent 3.5px) 8px 9px / 16px 16px,
    radial-gradient(circle, #FFE566 3.5px, transparent 3.5px) 16px 17px / 16px 16px,
    #FFB3C1;
}

/* Egg shine overlay */
.egg::after {
  content: '';
  position: absolute;
  top: 8%;
  left: 15%;
  width: 30%;
  height: 35%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.45) 0%, transparent 100%);
  border-radius: 50%;
  transform: rotate(-20deg);
  pointer-events: none;
}

/* Small emoji decoration on egg */
.egg-emoji {
  position: absolute;
  bottom: 12%;
  right: 16%;
  font-size: 0.75em;
  opacity: 0.85;
  pointer-events: none;
}

/* ── MATCH CONFETTI ─────────────────────────── */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  pointer-events: none;
  animation: confettiFall linear forwards;
  z-index: 50;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
  100% { transform: translateY(200px) rotate(540deg); opacity: 0; }
}

/* ── FLOAT TEXT ─────────────────────────────── */
.float-txt {
  position: fixed;
  pointer-events: none;
  font-size: 1.6rem;
  font-weight: 900;
  color: #FFE566;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  animation: floatUp 0.9s forwards;
  z-index: 100;
  white-space: nowrap;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
}

/* ── OVERLAY ────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
}
.overlay-box {
  background: linear-gradient(135deg, #16213e, #1a2e16);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 22px;
  padding: 36px 48px;
  text-align: center;
  max-width: 380px;
  width: 92%;
}
.overlay-box h2 { font-size: 2.5rem; margin-bottom: 6px; }
.overlay-box p  { color: #aaa; margin: 5px 0; line-height: 1.5; font-size: 0.9rem; }
.score-big { font-size: 2rem; font-weight: 900; color: #FFE566; margin: 12px 0; }
.btn {
  margin-top: 16px;
  padding: 12px 30px;
  background: linear-gradient(135deg, #FFB3C1, #C3A3D1);
  color: #1a0d2e;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
.btn:hover { transform: scale(1.05); }
.btn-secondary {
  margin-left: 10px;
  background: rgba(255,255,255,0.1);
  color: #ccc;
}

/* ── STARS DISPLAY ──────────────────────────── */
.stars { font-size: 2rem; margin: 6px 0; letter-spacing: 4px; }

/* ── WRONG FLASH ────────────────────────────── */
@keyframes wrongFlash {
  0%, 100% { filter: none; }
  30%  { filter: brightness(0.5) sepia(1) hue-rotate(0deg) saturate(5); }
  60%  { filter: brightness(0.5) sepia(1) hue-rotate(0deg) saturate(5); }
}
.wrong-flash { animation: wrongFlash 0.5s; }
</style>
</head>
<body>

<h1 class="title">🥚 Ous de Pasqua 67</h1>
<p class="subtitle">MEMORY · SUMA 67</p>
<a class="back-link" href="eat-67.html">← Tornar al joc del 7</a>

<div class="hud">
  <div class="hud-box">
    <div class="hud-label">Punts</div>
    <div class="hud-value" id="score-val">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Parelles</div>
    <div class="hud-value" id="pairs-val">0/0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Intents</div>
    <div class="hud-value" id="moves-val">0</div>
  </div>
  <div class="hud-box" id="timer-box">
    <div class="hud-label">Temps</div>
    <div class="hud-value" id="timer-val">67</div>
  </div>
</div>

<div class="diff-row">
  <button class="diff-btn active" onclick="setDifficulty('easy',this)">Fàcil 4×4</button>
  <button class="diff-btn"        onclick="setDifficulty('medium',this)">Mitjà 4×5</button>
  <button class="diff-btn"        onclick="setDifficulty('hard',this)">Difícil 5×6</button>
</div>

<div id="grid"></div>

<script>
// ── DIFFICULTY ───────────────────────────────────────────────────
const DIFFICULTIES = {
  easy:   { cols: 4, pairs: 8  },
  medium: { cols: 4, pairs: 10 },
  hard:   { cols: 5, pairs: 15 },
};

// ── ALL POSSIBLE PAIRS (sum=67) ──────────────────────────────────
const ALL_PAIRS = [
  [5,62],[7,60],[10,57],[12,55],[15,52],[17,50],[20,47],
  [22,45],[25,42],[27,40],[30,37],[32,35],[33,34],[8,59],
  [18,49],[23,44],[28,39],[3,64],[6,61],[14,53],
];

// ── CARD-BACK COVER ──────────────────────────────────────────────
// Un sol disseny de revers per a totes les cartes: així l'ou no
// delata quines cartes fan parella — cal girar-les i sumar 67.
const COVER_EGG = { cls: 'egg-0', emoji: '🥚' };

// ── STATE ────────────────────────────────────────────────────────
let cards        = [];   // {pairId, value, el, flipped, matched}
let flipped      = [];   // at most 2 at a time
let locked       = false;
let score        = 0;
let moves        = 0;
let matchedPairs = 0;
let totalPairs   = 0;
let timeLeft     = 67;
let timerInterval;
let gameRunning  = false;
let difficulty   = 'easy';
let cardSize     = 80;

// ── LAYOUT ───────────────────────────────────────────────────────
function calcCardSize() {
  const cfg   = DIFFICULTIES[difficulty];
  const maxW  = Math.min(window.innerWidth - 24, 560);
  const size  = Math.floor((maxW - (cfg.cols - 1) * 8) / cfg.cols);
  return Math.max(62, Math.min(size, 110));
}

function setDifficulty(d, btn) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  startGame();
}

// ── BUILD CARDS ──────────────────────────────────────────────────
function buildCards() {
  const cfg    = DIFFICULTIES[difficulty];
  totalPairs   = cfg.pairs;
  cardSize     = calcCardSize();

  // Pick pairs
  const pairs  = shuffle([...ALL_PAIRS]).slice(0, totalPairs);
  // Assign egg per pair (cycle through eggs)
  const cardList = [];
  pairs.forEach((pair, i) => {
    pair.forEach(value => {
      cardList.push({ pairId: i, value, flipped: false, matched: false });
    });
  });
  const shuffled = shuffle(cardList);

  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  gridEl.style.gridTemplateColumns = `repeat(${cfg.cols}, ${cardSize}px)`;
  cards = [];

  shuffled.forEach((data, idx) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.width  = cardSize + 'px';
    el.style.height = cardSize + 'px';
    el.dataset.idx  = idx;

    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="egg ${COVER_EGG.cls}">
            <span class="egg-emoji">${COVER_EGG.emoji}</span>
          </div>
        </div>
        <div class="card-front">
          <div class="card-number">${data.value}</div>
          <div class="card-hint">suma 67</div>
        </div>
      </div>`;

    el.addEventListener('click', () => onCardClick(idx));
    gridEl.appendChild(el);
    cards.push({ ...data, el });
  });

  document.getElementById('pairs-val').textContent = `0/${totalPairs}`;
}

// ── CARD CLICK ───────────────────────────────────────────────────
function onCardClick(idx) {
  if (!gameRunning || locked) return;
  const card = cards[idx];
  if (card.flipped || card.matched) return;

  card.flipped = true;
  card.el.classList.add('flipped');
  flipped.push(idx);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves-val').textContent = moves;
    locked = true;
    checkMatch();
  }
}

function checkMatch() {
  const [i, j] = flipped;
  const a = cards[i], b = cards[j];

  if (a.pairId === b.pairId) {
    // Match!
    setTimeout(() => {
      a.matched = b.matched = true;
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      matchedPairs++;

      const pts = Math.max(10, 100 - moves * 2);
      score += pts;
      document.getElementById('score-val').textContent  = score;
      document.getElementById('pairs-val').textContent  = `${matchedPairs}/${totalPairs}`;

      // Bonus time +7s on each match
      timeLeft = Math.min(67, timeLeft + 7);
      refreshTimer();

      showFloat(`+${pts}`, a.el);
      spawnConfetti(a.el);

      flipped = [];
      locked  = false;

      if (matchedPairs === totalPairs) setTimeout(endGame, 400);
    }, 300);
  } else {
    // No match – red flash then flip back
    setTimeout(() => {
      a.el.classList.add('wrong-flash');
      b.el.classList.add('wrong-flash');
      setTimeout(() => {
        a.flipped = b.flipped = false;
        a.el.classList.remove('flipped', 'wrong-flash');
        b.el.classList.remove('flipped', 'wrong-flash');
        flipped = [];
        locked  = false;
      }, 450);
    }, 600);
  }
}

// ── TIMER ────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameRunning) return;
    timeLeft--;
    refreshTimer();
    if (timeLeft <= 0) endGame('time');
  }, 1000);
}

function refreshTimer() {
  const el  = document.getElementById('timer-val');
  const box = document.getElementById('timer-box');
  el.textContent = Math.max(0, timeLeft);
  box.className  = 'hud-box';
  if      (timeLeft <= 5)  box.classList.add('urgent');
  else if (timeLeft <= 15) box.classList.add('warning');
}

// ── CONFETTI ─────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FFB3C1','#AED9E0','#FFE566','#B5EAD7','#C3A3D1','#FFC9A3'];

function spawnConfetti(fromEl) {
  const rect = fromEl.getBoundingClientRect();
  const cx   = rect.left + rect.width  / 2;
  const cy   = rect.top  + rect.height / 2;
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left            = cx + (Math.random() - 0.5) * 40 + 'px';
    el.style.top             = cy + 'px';
    el.style.background      = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    el.style.animationDuration = (0.6 + Math.random() * 0.7) + 's';
    el.style.transform       = `translateX(${(Math.random()-0.5)*60}px)`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── FLOAT TEXT ───────────────────────────────────────────────────
function showFloat(txt, fromEl) {
  const rect = fromEl.getBoundingClientRect();
  const el   = document.createElement('div');
  el.className    = 'float-txt';
  el.textContent  = txt;
  el.style.left   = (rect.left + rect.width / 2) + 'px';
  el.style.top    = (rect.top  + window.scrollY) + 'px';
  el.style.transform = 'translateX(-50%)';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── STARS ────────────────────────────────────────────────────────
function calcStars() {
  const perfect = totalPairs; // minimum moves possible
  if (moves <= perfect + 2) return '⭐⭐⭐';
  if (moves <= perfect + 6) return '⭐⭐';
  return '⭐';
}

// ── GAME FLOW ────────────────────────────────────────────────────
function startGame() {
  document.querySelectorAll('.overlay').forEach(o => o.remove());
  score = 0; moves = 0; matchedPairs = 0; timeLeft = 67;
  flipped = []; locked = false; gameRunning = false;
  clearInterval(timerInterval);

  document.getElementById('score-val').textContent  = '0';
  document.getElementById('moves-val').textContent  = '0';
  refreshTimer();

  buildCards();

  gameRunning = true;
  startTimer();
}

function endGame(reason) {
  gameRunning = false;
  clearInterval(timerInterval);

  const isTime  = reason === 'time';
  const isWin   = matchedPairs === totalPairs;
  const stars   = isWin ? calcStars() : '';
  const timePts = isWin ? timeLeft * 5 : 0;
  const total   = score + timePts;

  const ov = document.createElement('div');
  ov.className = 'overlay';

  if (isWin) {
    ov.innerHTML = `
      <div class="overlay-box">
        <h2>🥚 Felicitats!</h2>
        <div class="stars">${stars}</div>
        <p>Has trobat totes les parelles!</p>
        <div class="score-big">🏆 ${total} punts</div>
        <p style="color:#666;font-size:0.8rem">
          Parelles: ${matchedPairs} · Intents: ${moves} · Bonus temps: +${timePts}
        </p>
        <div>
          <button class="btn" onclick="startGame()">Jugar de nou</button>
        </div>
      </div>`;
  } else {
    ov.innerHTML = `
      <div class="overlay-box">
        <h2>${isTime ? '⏰ Temps!' : '💀 Oh no!'}</h2>
        <p>${isTime ? 'S\'ha acabat el temps...' : ''}</p>
        <p>Parelles trobades: <strong style="color:#B5EAD7">${matchedPairs}/${totalPairs}</strong></p>
        <div class="score-big">${score} punts</div>
        <button class="btn" onclick="startGame()">Tornar a intentar-ho</button>
      </div>`;
  }
  document.body.appendChild(ov);
}

// ── WELCOME ──────────────────────────────────────────────────────
function showWelcome() {
  buildCards();

  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="overlay-box">
      <h2 style="font-size:2rem">🥚 Ous de Pasqua 67</h2>
      <p style="color:#B5EAD7;margin:6px 0;font-size:1rem">Memory de Pasqua</p>
      <p style="margin:14px 0 6px">
        Gira les cartes i troba parelles de números<br>
        que sumin exactament <strong style="color:#FFE566;font-size:1.2em">67</strong>.
      </p>
      <p style="color:#888;font-size:0.82rem">
        Tens 67 segons. Cada parella trobada<br>et dóna +7 segons extra!
      </p>
      <button class="btn" onclick="startGame()">Començar!</button>
    </div>`;
  document.body.appendChild(ov);
}

// ── UTILS ────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

window.addEventListener('resize', () => {
  if (gameRunning) {
    const cfg  = DIFFICULTIES[difficulty];
    const size = calcCardSize();
    if (size !== cardSize) {
      cardSize = size;
      document.getElementById('grid').style.gridTemplateColumns =
        `repeat(${cfg.cols}, ${cardSize}px)`;
      cards.forEach(c => {
        c.el.style.width  = cardSize + 'px';
        c.el.style.height = cardSize + 'px';
      });
    }
  }
});

showWelcome();
</script>
</body>
</html>
